name: ci-cd

on:
  push:
    branches: [ "main" ]

permissions:
  contents: read
  packages: write

env:
  IMAGE_NAME: ghcr.io/lioneldj24/plateforme-de-diffusion-de-contenu-statique-cloud-native
  K8S_NAMESPACE: content-platform

jobs:
  test-build-push-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install backend deps
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements.txt

      - name: Lint
        run: |
          cd backend && ruff check app tests

      - name: Tests
        run: |
          cd backend && python -m pytest tests

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          push: true
          tags: |
            ${{ env.IMAGE_NAME }}:latest
            ${{ env.IMAGE_NAME }}:${{ github.sha }}

      - name: Set up kubeconfig
        run: |
          mkdir -p $HOME/.kube
          echo "${{ secrets.KUBE_CONFIG }}" > $HOME/.kube/config
          chmod 600 $HOME/.kube/config

      - name: Update Azure secret
        run: |
          kubectl -n ${{ env.K8S_NAMESPACE }} create secret generic blob-secret \
            --from-literal=AZURE_STORAGE_CONNECTION_STRING="${{ secrets.AZURE_STORAGE_CONNECTION_STRING }}" \
            --dry-run=client -o yaml | kubectl apply -f -

      - name: Deploy manifests
        run: |
          sed -i "s#ghcr.io/OWNER/REPO:latest#${{ env.IMAGE_NAME }}:${{ github.sha }}#g" backend/k8s/deployment.yaml
          kubectl apply -k backend/k8s

      - name: Smoke test
        run: |
          kubectl -n ${{ env.K8S_NAMESPACE }} rollout status deploy/content-api --timeout=300s
          kubectl -n ${{ env.K8S_NAMESPACE }} port-forward svc/content-api-svc 8080:80 &
          sleep 3
          curl -fsS http://127.0.0.1:8080/healthz
