name: ci-cd

on:
  push:
    branches: [ "main" ]

permissions:
  contents: read
  packages: write

env:
  IMAGE_NAME: ghcr.io/${{ github.repository_owner }}/${{ github.event.repository.name }}
  K8S_NAMESPACE: content-platform

jobs:
  test-build-push-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install backend deps
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements.txt
          pip install pytest ruff

      - name: Lint
        run: |
          ruff check backend/app backend/tests

      - name: Tests
        run: |
          cd backend && PYTHONPATH=. pytest tests

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          push: true
          tags: |
            ${{ env.IMAGE_NAME }}:latest
            ${{ env.IMAGE_NAME }}:${{ github.sha }}

      # ===== AKS DEPLOY (requires secrets) =====
      - name: Azure login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Set AKS context
        uses: azure/aks-set-context@v4
        with:
          resource-group: ${{ secrets.AKS_RESOURCE_GROUP }}
          cluster-name: ${{ secrets.AKS_CLUSTER_NAME }}

      - name: Deploy manifests
        run: |
          # Replace image with commit SHA for traceability
          sed -i "s#ghcr.io/OWNER/REPO:latest#${{ env.IMAGE_NAME }}:${{ github.sha }}#g" backend/k8s/deployment.yaml
          kubectl apply -k backend/k8s

      - name: Smoke test
        run: |
          kubectl -n ${{ env.K8S_NAMESPACE }} rollout status deploy/content-api --timeout=180s
          # Simple smoke: call service via port-forward
          kubectl -n ${{ env.K8S_NAMESPACE }} port-forward svc/content-api-svc 8080:80 &
          sleep 3
          curl -fsS http://127.0.0.1:8080/healthz
